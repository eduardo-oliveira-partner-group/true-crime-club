          type: string
          example: frenet-02124040-JTE_INT
        codigoServico:
          type: string
          example: JTE_INT
        transportadora:
          type: string
          example: J&T Express
        codigoTransportadora:
          type: string
          example: JTE
    Pedido:
      type: object
      properties:
        id:
          type: string
          example: pedido-003
        numeroPedido:
          type: string
          example: TCC-202604-1052
        status:
          type: string
          enum:
          - pagamento_pendente
          - pago
          - em_processamento
          - aguardando_envio
          - enviado
          - entregue
          - cancelado
          example: pago
        statusPagamento:
          type: string
          enum:
          - pendente
          - pago
          - recusado
          - expirado
          - estornado
          example: pago
        subtotal:
          type: integer
          example: 14990
        frete:
          type: integer
          example: 1990
        desconto:
          type: integer
          example: 0
        total:
          type: integer
          example: 16980
        criadoEm:
          type: string
          format: date-time
          example: '2026-04-27T14:50:00.000Z'
        observacaoCicloCobranca:
          type: string
          example: Cobrança processada no mês da compra.
        observacaoCicloEnvio:
          type: string
          example: Envio previsto para o mês seguinte.
    PedidoDetalhado:
      allOf:
      - $ref: '#/components/schemas/Pedido'
      - type: object
        properties:
          itens:
            type: array
            items:
              $ref: '#/components/schemas/CarrinhoItem'
    Assinatura:
