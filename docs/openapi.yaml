openapi: 3.0.3
info:
  title: True Crime Club API
  description: 'Especificação OpenAPI para a API do True Crime Club. Esta API conecta
    todas as partes dinâmicas da aplicação (entrada, loja, finalização de compra,
    área do cliente) e servirá tanto para a simulação interna quanto para o serviço
    externo definitivo.


    Convenções gerais:

    * Valores monetários são expressos em centavos (ex: `14990` equivale a `R$ 149,90`).

    * Datas seguem o formato ISO 8601 (`YYYY-MM-DDTHH:mm:ss.sssZ`).

    '
  version: 1.0.0
servers:
- url: http://localhost:8000/api
  description: API FastAPI local (tcc-front-office-api)
- url: http://localhost:3000/api
  description: Servidor local de simulação (proxy Next)
- url: https://api.truecrimeclub.com.br/v1
  description: Servidor de produção futuro
tags:
- name: Autenticação
  description: Registro, Entrada e Sessão do Cliente
- name: Catálogo
  description: Consulta de Produtos, Caixas e Planos de Assinatura
- name: Carrinho
  description: Manipulação do Carrinho de Compras e Cupons
- name: Finalização & Frete
  description: Cálculo de Frete e Fechamento de Pedidos
- name: Cliente & Painel
  description: Informações Pessoais, Endereços, Assinatura, Pagamentos e Faturas do
    Cliente
- name: Conteúdo & Investigação
  description: Casos, Pistas, Progresso e Arquivos Liberados
- name: Conteúdo Dinâmico & SEO
  description: Textos de Páginas, Banners Editáveis e Tags de SEO
- name: CMS Delivery
  description: Entrega de páginas e estruturas públicas gerenciadas pelo CMS.
paths:
  /autenticacao/entrar:
    post:
      tags:
      - Autenticação
      summary: Autenticar cliente
      description: Autentica o cliente e emite uma sessão opaca em cookie HttpOnly.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - senha
              properties:
                user:
                  type: string
                  description: Login ou e-mail do cliente (alternativa a email).
                  example: mariana.silva@email.com
                email:
                  type: string
                  description: E-mail do cliente (alternativa a user).
                  example: mariana.silva@email.com
                senha:
                  type: string
                  format: password
                  example: segredoforte
              description: Informe senha e user ou email.
      responses:
        '200':
          description: Autenticação realizada com sucesso.
          content:
            application/json:
              schema:
                type: object
                properties:
                  cliente:
                    $ref: '#/components/schemas/Cliente'
        '401':
          description: E-mail ou senha inválidos.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'
  /autenticacao/sair:
    post:
      tags:
      - Autenticação
      summary: Encerrar sessão do cliente
      description: Revoga a sessão persistida e remove o cookie do cliente.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                token_sessao:
                  type: string
                  nullable: true
      responses:
        '200':
          description: Sessão encerrada com sucesso.
          content:
            application/json:
              schema:
                type: object
                properties:
                  sucesso:
                    type: boolean
                    example: true
  /autenticacao/cliente-atual:
    get:
      tags:
      - Autenticação
      summary: Obter dados do cliente autenticado
      description: Retorna as informações do cliente logado com base no cookie de
        sessão.
      responses:
        '200':
          description: Cliente retornado com sucesso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cliente'
        '401':
          description: Não autenticado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'
  /clientes/recuperar-senha:
    post:
      tags:
      - Autenticação
      summary: Disparar fluxo de recuperação de senha
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - email
              properties:
                email:
                  type: string
                  format: email
                  example: mariana.silva@email.com
      responses:
        '202':
          description: Solicitação aceita e e-mail disparado.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: email_enviado
        '401':
          description: Não autenticado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'
      security:
      - cookieAuth: []
  /clientes:
    post:
      tags:
      - Autenticação
      summary: Cadastrar novo cliente
      description: Cria uma nova conta de cliente. A sessão é criada somente no login.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - nome
              - email
              - senha
              - documento
              - telefone
              properties:
                nome:
                  type: string
                  example: Mariana Silva
                email:
                  type: string
                  format: email
                  example: mariana.silva@email.com
                senha:
                  type: string
                  format: password
                  minLength: 12
                  example: SenhaForte123
                documento:
                  type: string
                  description: CPF do cliente, com ou sem pontuação.
                  example: '529.982.247-25'
                telefone:
                  type: string
                  example: '11987654321'
      responses:
        '201':
          description: Cliente cadastrado com sucesso.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: cadastro_criado
                  cliente:
                    $ref: '#/components/schemas/Cliente'
        '400':
          description: Dados inválidos.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'
        '409':
          description: E-mail já cadastrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'
  /clientes/{id}:
    patch:
      tags:
      - Cliente & Painel
      summary: Atualizar dados cadastrais e preferências
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          example: cliente-001
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                nome:
                  type: string
                telefone:
                  type: string
                preferencias:
                  $ref: '#/components/schemas/PreferenciasAssinante'
      responses:
        '200':
          description: Dados atualizados com sucesso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cliente'
        '401':
          description: Não autenticado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'
        '403':
          description: Sem permissão.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'
      security:
      - cookieAuth: []
  /clientes/{id}/enderecos:
    get:
      tags:
      - Cliente & Painel
      summary: Listar endereços do cliente
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Lista de endereços.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Endereco'
        '401':
          description: Não autenticado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'
        '403':
          description: Sem permissão.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'
      security:
      - cookieAuth: []
    post:
      tags:
      - Cliente & Painel
      summary: Criar novo endereço
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EntradaEndereco'
      responses:
        '201':
          description: Endereço criado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Endereco'
        '401':
          description: Não autenticado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'
        '403':
          description: Sem permissão.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'
      security:
      - cookieAuth: []
  /clientes/{id}/enderecos/{idEndereco}:
    delete:
      tags:
      - Cliente & Painel
      summary: Remover endereço
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      - name: idEndereco
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Endereço removido.
          content:
            application/json:
              schema:
                type: object
                properties:
                  sucesso:
                    type: boolean
                    example: true
        '401':
          description: Não autenticado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'
        '403':
          description: Sem permissão.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'
      security:
      - cookieAuth: []
  /produtos:
    get:
      tags:
      - Catálogo
      summary: Listar produtos e caixas
      parameters:
      - name: destaque
        in: query
        required: false
        schema:
          type: boolean
        description: Filtrar apenas itens em destaque
      - name: categoria
        in: query
        required: false
        schema:
          type: string
        description: Filtrar por categoria (ex. 'caixa', 'avulsa')
      responses:
        '200':
          description: Lista de produtos obtida com sucesso.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Produto'
  /produtos/{identificador}:
    get:
      tags:
      - Catálogo
      summary: Obter detalhes do produto pelo identificador
      parameters:
      - name: identificador
        in: path
        required: true
        schema:
          type: string
          example: tcc-caixa-03-avulsa
      responses:
        '200':
          description: Produto encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProdutoDetalhado'
        '404':
          description: Produto não encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'
  /planos:
    get:
      tags:
      - Catálogo
      summary: Listar planos de assinatura
      responses:
        '200':
          description: Lista de planos.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PlanoAssinatura'
  /planos/{identificador}:
    get:
      tags:
      - Catálogo
      summary: Obter detalhes do plano pelo identificador
      parameters:
      - name: identificador
        in: path
        required: true
        schema:
          type: string
          example: anual
      responses:
        '200':
          description: Plano encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlanoAssinatura'
        '404':
          description: Plano não encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'
  /carrinho:
    get:
      tags:
      - Carrinho
      summary: Obter o carrinho atual
      responses:
        '200':
          description: Estado do carrinho.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Carrinho'
        '401':
          description: Não autenticado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'
      security:
      - cookieAuth: []
  /carrinho/itens:
    post:
      tags:
      - Carrinho
      summary: Adicionar item ao carrinho
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - idProduto
              properties:
                idProduto:
                  type: string
                  example: produto-005
                quantidade:
                  type: integer
                  minimum: 1
                  default: 1
                  example: 1
      responses:
        '200':
          description: Item adicionado com sucesso. Retorna o carrinho atualizado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Carrinho'
        '400':
          description: Produto inválido ou esgotado.
        '401':
          description: Não autenticado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'
      security:
      - cookieAuth: []
  /carrinho/itens/{idItem}:
    put:
      tags:
      - Carrinho
      summary: Atualizar quantidade de um item
      parameters:
      - name: idItem
        in: path
        required: true
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - quantidade
              properties:
                quantidade:
                  type: integer
                  minimum: 1
                  example: 2
      responses:
        '200':
          description: Quantidade atualizada. Retorna o carrinho.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Carrinho'
        '401':
          description: Não autenticado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'
        '403':
          description: Sem permissão.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'
      security:
      - cookieAuth: []
    delete:
      tags:
      - Carrinho
      summary: Remover item do carrinho
      parameters:
      - name: idItem
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Item removido. Retorna o carrinho.
          content:
            application/json:
              schema:
                type: object
                properties:
                  sucesso:
                    type: boolean
                    example: true
        '401':
          description: Não autenticado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'
        '403':
          description: Sem permissão.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'
      security:
      - cookieAuth: []
  /carrinho/cupom:
    post:
      tags:
      - Carrinho
      summary: Aplicar cupom de desconto ao carrinho
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - codigo
              properties:
                codigo:
                  type: string
                  example: DETETIVE10
      responses:
        '200':
          description: Resultado da aplicação do cupom.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultadoCupom'
        '401':
          description: Não autenticado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'
      security:
      - cookieAuth: []
  /finalizacao/frete:
    post:
      tags:
      - Finalização & Frete
      summary: Calcular frete para um CEP
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - cep
              properties:
                cep:
                  type: string
                  example: 05435-020
      responses:
        '200':
          description: Cálculo realizado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FreteEstimado'
        '401':
          description: Não autenticado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'
      security:
      - cookieAuth: []
  /finalizacao/pedido:
    post:
      tags:
      - Finalização & Frete
      summary: Finalizar compra e criar pedido
      description: Finaliza o checkout via functions PostgreSQL. Em homologação, devolve um cenário estático de cartão ou Pix e não altera o carrinho local.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - idEndereco
              - idMetodoPagamento
              properties:
                idEndereco:
                  type: string
                  example: endereco-001
                idMetodoPagamento:
                  type: string
                  example: metodo-pagamento-001
                simulacaoAssinatura:
                  type: boolean
                  description: Indica que o checkout também deve contratar a assinatura via RPC.
                planoId:
                  type: string
                  description: Obrigatório quando simulacaoAssinatura for true.
                  example: plano-anual
                planoNome:
                  type: string
                  example: Plano Anual
                planoPreco:
                  type: integer
                  example: 149900
      responses:
        '201':
          description: Pedido criado com sucesso.
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/PedidoDetalhado'
                - type: object
                  properties:
                    pagamento:
                      $ref: '#/components/schemas/Pagamento'
                    assinatura:
                      $ref: '#/components/schemas/Assinatura'
        '401':
          description: Não autenticado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'
      security:
      - cookieAuth: []
  /cliente/perfil:
    get:
      tags:
      - Cliente & Painel
      summary: Obter perfil consolidado do cliente
      description: Retorna dados cadastrais, endereços e métodos de pagamento do cliente
        autenticado.
      responses:
        '200':
          description: Perfil retornado com sucesso.
          content:
            application/json:
              schema:
                type: object
                properties:
                  cliente:
                    $ref: '#/components/schemas/Cliente'
                  enderecos:
                    type: array
                    items:
                      $ref: '#/components/schemas/Endereco'
                  metodosPagamento:
                    type: array
                    items:
                      $ref: '#/components/schemas/MetodoPagamento'
        '401':
          description: Não autenticado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'
      security:
      - cookieAuth: []
  /cliente/pedidos:
    get:
      tags:
      - Cliente & Painel
      summary: Listar histórico de pedidos do cliente
      responses:
        '200':
          description: Lista de pedidos.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Pedido'
        '401':
          description: Não autenticado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'
      security:
      - cookieAuth: []
  /cliente/pedidos/{id}:
    get:
      tags:
      - Cliente & Painel
      summary: Detalhar pedido do cliente
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Detalhes do pedido.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PedidoDetalhado'
        '404':
          description: Pedido não encontrado.
        '401':
          description: Não autenticado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'
        '403':
          description: Sem permissão.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'
      security:
      - cookieAuth: []
  /cliente/assinatura:
    get:
      tags:
      - Cliente & Painel
      summary: Obter a assinatura ativa do cliente
      responses:
        '200':
          description: Dados da assinatura.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Assinatura'
        '404':
          description: Nenhuma assinatura ativa.
        '401':
          description: Não autenticado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'
      security:
      - cookieAuth: []
    post:
      tags:
      - Cliente & Painel
      summary: Cancelar ou reativar assinatura
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - acao
              properties:
                acao:
                  type: string
                  enum:
                  - cancelar
                  - reativar
                  example: cancelar
      responses:
        '200':
          description: Assinatura atualizada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Assinatura'
        '401':
          description: Não autenticado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'
      security:
      - cookieAuth: []
  /cliente/pagamentos:
    get:
      tags:
      - Cliente & Painel
      summary: Listar cobranças e pagamentos do cliente
      description: 'Histórico de cobranças da assinatura e de pedidos avulsos.

        Usado em `/cliente/financeiro` (`listPayments`).

        '
      responses:
        '200':
          description: Lista de pagamentos/cobranças.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Pagamento'
        '401':
          description: Não autenticado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'
      security:
      - cookieAuth: []
  /cliente/pagamentos/{id}:
    get:
      tags:
      - Cliente & Painel
      summary: Detalhar cobrança/pagamento
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          example: pagamento-001
      responses:
        '200':
          description: Detalhes do pagamento.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pagamento'
        '404':
          description: Pagamento não encontrado.
        '401':
          description: Não autenticado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'
        '403':
          description: Sem permissão.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'
      security:
      - cookieAuth: []
  /cliente/pagamentos/{id}/renovar-pix:
    post:
      tags:
      - Cliente & Painel
      summary: Renovar QR Code Pix de um pagamento pendente
      description: 'Gera novo QR Code e nova expiração para pagamento Pix pendente.

        Usado em `/cliente/financeiro` (`renewPixPayment`).

        '
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          example: pagamento-004
      responses:
        '200':
          description: Pagamento Pix renovado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pagamento'
        '404':
          description: Pagamento não encontrado.
        '409':
          description: Pagamento já pago ou não elegível para renovação.
        '410':
          description: Pagamento expirado definitivamente.
        '401':
          description: Não autenticado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'
        '403':
          description: Sem permissão.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'
      security:
      - cookieAuth: []
  /cliente/faturas:
    get:
      tags:
      - Cliente & Painel
      summary: Listar faturas e recibos do cliente
      description: 'Histórico de faturas/recibos associados às cobranças.

        Usado em `/cliente/financeiro` (`listInvoices`).

        '
      responses:
        '200':
          description: Lista de faturas.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Fatura'
        '401':
          description: Não autenticado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'
      security:
      - cookieAuth: []
  /cliente/cartoes:
    get:
      tags:
      - Cliente & Painel
      summary: Listar cartões de crédito do cliente
      description: Retorna a lista de cartões de crédito cadastrados para o cliente
        logado.
      responses:
        '200':
          description: Lista de cartões de crédito.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MetodoPagamento'
        '401':
          description: Não autenticado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'
      security:
      - cookieAuth: []
    post:
      tags:
      - Cliente & Painel
      summary: Adicionar novo cartão de crédito
      description: Adiciona um novo cartão de crédito usando um token gerado pelo
        gateway.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - token
              - nomeImpresso
              - ultimosQuatro
              - bandeira
              properties:
                token:
                  type: string
                  example: tok_visa_1234
                nomeImpresso:
                  type: string
                  example: Mariana Silva
                ultimosQuatro:
                  type: string
                  example: '1234'
                bandeira:
                  type: string
                  example: Visa
      responses:
        '201':
          description: Cartão adicionado com sucesso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MetodoPagamento'
        '401':
          description: Não autenticado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'
      security:
      - cookieAuth: []
  /cliente/cartoes/{id}:
    patch:
      tags:
      - Cliente & Painel
      summary: Atualizar cartão de crédito
      description: 'Define ou remove a flag de cartão padrão (`padrao`).

        Usado em `/cliente/cartoes` (`updateCard`).

        '
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          example: pm-001
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - padrao
              properties:
                padrao:
                  type: boolean
                  example: true
      responses:
        '200':
          description: Cartão atualizado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MetodoPagamento'
        '401':
          description: Não autenticado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'
      security:
      - cookieAuth: []
    delete:
      tags:
      - Cliente & Painel
      summary: Remover cartão de crédito
      description: Remove um cartão de crédito cadastrado pelo ID.
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          example: pm-001
      responses:
        '200':
          description: Cartão removido com sucesso.
          content:
            application/json:
              schema:
                type: object
                properties:
                  sucesso:
                    type: boolean
                    example: true
        '401':
          description: Não autenticado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'
        '403':
          description: Sem permissão.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'
      security:
      - cookieAuth: []
  /conteudos-exclusivos:
    get:
      tags:
      - Conteúdo & Investigação
      summary: Listar conteúdos exclusivos / pistas liberadas
      responses:
        '200':
          description: Conteúdos disponíveis.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ConteudoExclusivo'
  /conteudos-exclusivos/{identificador}:
    get:
      tags:
      - Conteúdo & Investigação
      summary: Obter detalhes de um conteúdo exclusivo pelo identificador
      parameters:
      - name: identificador
        in: path
        required: true
        schema:
          type: string
          example: pista-ciclo-3
      responses:
        '200':
          description: Detalhes do conteúdo.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConteudoExclusivo'
        '403':
          description: Conteúdo bloqueado para o ciclo atual do assinante.
  /casos:
    get:
      tags:
      - Conteúdo & Investigação
      summary: Obter dados gerais dos casos e progresso
      responses:
        '200':
          description: Informações forenses consolidadas.
          content:
            application/json:
              schema:
                type: object
                properties:
                  casoAtivo:
                    $ref: '#/components/schemas/Caso'
                  progresso:
                    $ref: '#/components/schemas/ProgressoAssinante'
                  pistas:
                    type: array
                    items:
                      $ref: '#/components/schemas/Pista'
  /casos/arquivos:
    get:
      tags:
      - Conteúdo & Investigação
      summary: Listar arquivos/documentos da experiência investigativa por box
      description: 'Retorna os arquivos e documentos agrupados por box.

        Usado na tela de investigação (/casos).

        '
      responses:
        '200':
          description: Lista de boxes com seus respectivos arquivos e documentos.
          content:
            application/json:
              schema:
                type: object
                required:
                - boxes
                properties:
                  boxes:
                    type: array
                    items:
                      $ref: '#/components/schemas/ArquivosCasoPorBox'
  /conteudo-dinamico:
    get:
      deprecated: true
      tags:
      - Conteúdo Dinâmico & SEO
      summary: Listar blocos de conteúdo dinâmico
      parameters:
      - name: rota
        in: query
        required: false
        schema:
          type: string
          example: /
        description: Filtrar blocos por rota de página
      responses:
        '200':
          description: Lista de blocos.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BlocoDinamico'
  /conteudo-dinamico/{chave}:
    get:
      deprecated: true
      tags:
      - Conteúdo Dinâmico & SEO
      summary: Obter bloco específico por chave
      parameters:
      - name: chave
        in: path
        required: true
        schema:
          type: string
          example: home.hero.title
        description: Chave única do bloco
      responses:
        '200':
          description: Bloco retornado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BlocoDinamico'
        '404':
          description: Bloco não encontrado.
  /seo:
    get:
      deprecated: true
      tags:
      - Conteúdo Dinâmico & SEO
      summary: Obter entradas de SEO
      parameters:
      - name: rota
        in: query
        required: true
        schema:
          type: string
          example: /loja
        description: Rota da página pública
      responses:
        '200':
          description: Metadados de SEO para a página.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntradaSeo'
  /paginas:
    get:
      tags:
      - CMS Delivery
      summary: Obter páginas publicadas
      description: Retorna uma única página publicada se o parâmetro rota for especificado,
        ou uma lista de páginas publicadas.
      parameters:
      - name: rota
        in: query
        required: false
        schema:
          type: string
          example: /sobre-o-clube
        description: Rota da página para obter a árvore completa de seções.
      responses:
        '200':
          description: Página ou lista de páginas retornadas com sucesso.
          content:
            application/json:
              schema:
                oneOf:
                - $ref: '#/components/schemas/PaginaCms'
                - type: array
                  items:
                    $ref: '#/components/schemas/PaginaCms'
        '404':
          description: Página não encontrada.
  /menus/{chave}:
    get:
      tags:
      - CMS Delivery
      summary: Obter navegação pública por chave
      description: Retorna a estrutura de navegação do menu solicitado (ex. header-principal,
        footer-principal).
      parameters:
      - name: chave
        in: path
        required: true
        schema:
          type: string
          example: header-principal
        description: Chave única do menu.
      responses:
        '200':
          description: Estrutura do menu.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MenuCms'
        '404':
          description: Menu não encontrado.
components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: tcc_session
  schemas:
    Cliente:
      type: object
      properties:
        id_cliente:
          type: integer
          example: 34
        nome:
          type: string
          example: Mariana Silva
        email:
          type: string
          format: email
          example: mariana.silva@email.com
        telefone:
          type: string
          example: (11) 98765-4321
        documento:
          type: string
          example: '42327908884'
        preferencias:
          $ref: '#/components/schemas/PreferenciasAssinante'
    PreferenciasAssinante:
      type: object
      properties:
        tamanhoCamiseta:
          type: string
          maxLength: 30
          example: M
        tamanhoCalcado:
          type: string
          maxLength: 30
          example: 38
        observacoes:
          type: string
          maxLength: 2000
          example: Prefere tons escuros nas peças.
    Endereco:
      type: object
      properties:
        id:
          type: string
          example: endereco-001
        rotulo:
          type: string
          example: Casa
        logradouro:
          type: string
          example: Rua das Acácias
        numero:
          type: string
          example: 142
        complemento:
          type: string
          example: Apto 82
        bairro:
          type: string
          example: Vila Madalena
        cidade:
          type: string
          example: São Paulo
        estado:
          type: string
          example: SP
        cep:
          type: string
          example: 05435-020
        padrao:
          type: boolean
          example: true
    EntradaEndereco:
      type: object
      required:
      - rotulo
      - logradouro
      - numero
      - bairro
      - cidade
      - estado
      - cep
      properties:
        rotulo:
          type: string
          example: Trabalho
        logradouro:
          type: string
          example: Av. Paulista
        numero:
          type: string
          example: 1000
        complemento:
          type: string
        bairro:
          type: string
          example: Bela Vista
        cidade:
          type: string
          example: São Paulo
        estado:
          type: string
          example: SP
        cep:
          type: string
          example: 01310-100
    Produto:
      type: object
      properties:
        id:
          type: string
          example: produto-005
        identificador:
          type: string
          example: tcc-caixa-03-avulsa
        nome:
          type: string
          example: TCC - CAIXA 03 (AVULSA)
        tipo:
          type: string
          enum:
          - produto
          - caixa
          example: caixa
        preco:
          type: integer
          example: 18990
        precoAssinante:
          type: integer
          example: 15990
        imagens:
          type: array
          items:
            type: string
          example:
          - /imagens/caixa-03.jpg
        categorias:
          type: array
          items:
            type: string
          example:
          - caixa
          - avulsa
        emEstoque:
          type: boolean
          example: true
        disponibilidade:
          type: string
          enum:
          - disponivel
          - limitado
          - esgotado
          - em_breve
          example: limitado
    ProdutoDetalhado:
      allOf:
      - $ref: '#/components/schemas/Produto'
      - type: object
        properties:
          descricao:
            type: string
