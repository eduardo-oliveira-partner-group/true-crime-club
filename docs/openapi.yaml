        id:
          type: string
          example: fatura-001
        numero:
          type: string
          example: REC-202603-0042
        idPagamento:
          type: string
          example: pagamento-001
        valor:
          type: integer
          description: Valor em centavos.
          example: 14990
        emitidoEm:
          type: string
          format: date-time
          example: '2026-03-01T08:15:00.000Z'
        urlRecibo:
          type: string
          example: /simulacao/recibos/rec-202603-0042.pdf
        urlDownload:
          type: string
          example: /simulacao/recibos/rec-202603-0042.pdf
    ConteudoExclusivo:
      type: object
      properties:
        id:
          type: string
          example: pista-003
        identificador:
          type: string
          example: pista-ciclo-3
        titulo:
          type: string
          example: Registro Bancário Suspeito
        descricao:
          type: string
          example: Extrato parcial das contas...
        status:
          type: string
          enum:
          - liberado
          - bloqueado
          example: liberado
        numeroCiclo:
          type: integer
          example: 3
        tipo:
          type: string
          enum:
          - pista
          - video
          - documento
          - artigo
          example: pista
        arquivos:
          type: array
          items:
            $ref: '#/components/schemas/ArquivoCaso'
    ArquivoCaso:
      type: object
      properties:
        id:
          type: string
          example: arquivo-003
        nome:
          type: string
          example: extrato-parcial.pdf
        tipo:
          type: string
          enum:
          - pdf
          - imagem
          - audio
          - video
          example: pdf
        urlDownload:
          type: string
          example: /simulacao/arquivos/extrato.pdf
        tamanho:
          type: string
          example: 180 KB
    Caso:
      type: object
      properties:
        id:
          type: string
          example: caso-2026
        identificador:
          type: string
          example: operacao-meia-noite
        titulo:
          type: string
          example: Operação Meia-Noite
        descricao:
          type: string
        ano:
          type: integer
          example: 2026
        totalPistas:
          type: integer
          example: 12
        dataEventoAoVivo:
          type: string
          format: date-time
        tituloEventoAoVivo:
