openapi: 3.0.3
info:
  title: True Crime Club API
  description: |
    Especificação OpenAPI para a API do True Crime Club. Esta API conecta todas as partes dinâmicas da aplicação (entrada, loja, finalização de compra, área do cliente) e servirá tanto para a simulação interna quanto para o serviço externo definitivo.
    
    Convenções gerais:
    * Valores monetários são expressos em centavos (ex: `14990` equivale a `R$ 149,90`).
    * Datas seguem o formato ISO 8601 (`YYYY-MM-DDTHH:mm:ss.sssZ`).
  version: 1.0.0
servers:
  - url: http://localhost:3000/api
    description: Servidor local de simulação
  - url: https://api.truecrimeclub.com.br/v1
    description: Servidor de produção futuro

tags:
  - name: Autenticação
    description: Registro, Entrada e Sessão do Cliente
  - name: Catálogo
    description: Consulta de Produtos, Caixas e Planos de Assinatura
  - name: Carrinho
    description: Manipulação do Carrinho de Compras e Cupons
  - name: Finalização & Frete
    description: Cálculo de Frete e Fechamento de Pedidos
  - name: Cliente & Painel
    description: Informações Pessoais, Endereços e Assinatura do Cliente
  - name: Conteúdo & Investigação
    description: Casos, Pistas, Progresso e Arquivos Liberados
  - name: Conteúdo Dinâmico & SEO
    description: Textos de Páginas, Banners Editáveis e Tags de SEO
  - name: CMS Delivery
    description: Entrega de páginas e estruturas públicas gerenciadas pelo CMS.

paths:
  # --- AUTENTICAÇÃO ---
  /autenticacao/entrar:
    post:
      tags:
        - Autenticação
      summary: Autenticar cliente
      description: Autentica o cliente e emite um cookie de sessão ou JWT.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - senha
              properties:
                email:
                  type: string
                  format: email
                  example: mariana.silva@email.com
                senha:
                  type: string
                  format: password
                  example: segredoforte
      responses:
        '200':
          description: Autenticação realizada com sucesso.
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                    example: jwt_exemplo
                  cliente:
                    $ref: '#/components/schemas/Cliente'
        '401':
          description: E-mail ou senha inválidos.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'

  /autenticacao/sair:
    post:
      tags:
        - Autenticação
      summary: Encerrar sessão do cliente
      description: Remove o cookie de sessão do cliente.
      responses:
        '200':
          description: Sessão encerrada com sucesso.
          content:
            application/json:
              schema:
                type: object
                properties:
                  sucesso:
                    type: boolean
                    example: true

  /autenticacao/cliente-atual:
    get:
      tags:
        - Autenticação
      summary: Obter dados do cliente autenticado
      description: Retorna as informações do cliente logado com base no cookie de sessão.
      responses:
        '200':
          description: Cliente retornado com sucesso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cliente'
        '401':
          description: Não autenticado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'

  /clientes/recuperar-senha:
    post:
      tags:
        - Autenticação
      summary: Disparar fluxo de recuperação de senha
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
              properties:
                email:
                  type: string
                  format: email
                  example: mariana.silva@email.com
      responses:
        '202':
          description: Solicitação aceita e e-mail disparado.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: email_enviado

  # --- CLIENTES ENDEREÇOS E ATUALIZAÇÕES ---
  /clientes/{id}:
    patch:
      tags:
        - Cliente & Painel
      summary: Atualizar dados cadastrais e preferências
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            example: cliente-001
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                nome:
                  type: string
                telefone:
                  type: string
                preferencias:
                  $ref: '#/components/schemas/PreferenciasAssinante'
      responses:
        '200':
          description: Dados atualizados com sucesso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cliente'

  /clientes/{id}/enderecos:
    get:
      tags:
        - Cliente & Painel
      summary: Listar endereços do cliente
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Lista de endereços.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Endereco'
    post:
      tags:
        - Cliente & Painel
      summary: Criar novo endereço
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EntradaEndereco'
      responses:
        '201':
          description: Endereço criado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Endereco'

  /clientes/{id}/enderecos/{idEndereco}:
    delete:
      tags:
        - Cliente & Painel
      summary: Remover endereço
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: idEndereco
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Endereço removido.
          content:
            application/json:
              schema:
                type: object
                properties:
                  sucesso:
                    type: boolean
                    example: true

  # --- CATALOGO ---
  /produtos:
    get:
      tags:
        - Catálogo
      summary: Listar produtos e caixas
      parameters:
        - name: destaque
          in: query
          required: false
          schema:
            type: boolean
          description: Filtrar apenas itens em destaque
        - name: categoria
          in: query
          required: false
          schema:
            type: string
          description: Filtrar por categoria (ex. 'caixa', 'avulsa')
      responses:
        '200':
          description: Lista de produtos obtida com sucesso.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Produto'

  /produtos/{identificador}:
    get:
      tags:
        - Catálogo
      summary: Obter detalhes do produto pelo identificador
      parameters:
        - name: identificador
          in: path
          required: true
          schema:
            type: string
            example: tcc-caixa-03-avulsa
      responses:
        '200':
          description: Produto encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProdutoDetalhado'
        '404':
          description: Produto não encontrado.

  /planos:
    get:
      tags:
        - Catálogo
      summary: Listar planos de assinatura
      responses:
        '200':
          description: Lista de planos.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PlanoAssinatura'

  # --- CARRINHO ---
  /carrinho:
    get:
      tags:
        - Carrinho
      summary: Obter o carrinho atual
      responses:
        '200':
          description: Estado do carrinho.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Carrinho'

  /carrinho/itens:
    post:
      tags:
        - Carrinho
      summary: Adicionar item ao carrinho
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - idProduto
              properties:
                idProduto:
                  type: string
                  example: produto-005
                quantidade:
                  type: integer
                  minimum: 1
                  default: 1
                  example: 1
      responses:
        '200':
          description: Item adicionado com sucesso. Retorna o carrinho atualizado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Carrinho'
        '400':
          description: Produto inválido ou esgotado.

  /carrinho/itens/{idItem}:
    put:
      tags:
        - Carrinho
      summary: Atualizar quantidade de um item
      parameters:
        - name: idItem
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - quantidade
              properties:
                quantidade:
                  type: integer
                  minimum: 1
                  example: 2
      responses:
        '200':
          description: Quantidade atualizada. Retorna o carrinho.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Carrinho'
    delete:
      tags:
        - Carrinho
      summary: Remover item do carrinho
      parameters:
        - name: idItem
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Item removido. Retorna o carrinho.
          content:
            application/json:
              schema:
                type: object
                properties:
                  sucesso:
                    type: boolean
                    example: true

  /carrinho/cupom:
    post:
      tags:
        - Carrinho
      summary: Aplicar cupom de desconto ao carrinho
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - codigo
              properties:
                codigo:
                  type: string
                  example: DETETIVE10
      responses:
        '200':
          description: Resultado da aplicação do cupom.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultadoCupom'

  # --- CHECKOUT & FRETE ---
  /finalizacao/frete:
    post:
      tags:
        - Finalização & Frete
      summary: Calcular frete para um CEP
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - cep
              properties:
                cep:
                  type: string
                  example: 05435-020
      responses:
        '200':
          description: Cálculo realizado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FreteEstimado'

  /finalizacao/pedido:
    post:
      tags:
        - Finalização & Frete
      summary: Finalizar compra e criar pedido
      description: Cria um pedido a partir dos itens do carrinho e limpa o carrinho.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - idEndereco
                - idMetodoPagamento
              properties:
                idEndereco:
                  type: string
                  example: endereco-001
                idMetodoPagamento:
                  type: string
                  example: metodo-pagamento-001
                idPlano:
                  type: string
                  description: Opcional, para fluxos de assinatura.
                  example: plano-anual
      responses:
        '201':
          description: Pedido criado com sucesso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pedido'

  # --- CLIENTE PAINEL (PEDIDOS E ASSINATURA) ---
  /cliente/pedidos:
    get:
      tags:
        - Cliente & Painel
      summary: Listar histórico de pedidos do cliente
      responses:
        '200':
          description: Lista de pedidos.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Pedido'

  /cliente/pedidos/{id}:
    get:
      tags:
        - Cliente & Painel
      summary: Detalhar pedido do cliente
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Detalhes do pedido.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PedidoDetalhado'
        '404':
          description: Pedido não encontrado.

  /cliente/assinatura:
    get:
      tags:
        - Cliente & Painel
      summary: Obter a assinatura ativa do cliente
      responses:
        '200':
          description: Dados da assinatura.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Assinatura'
        '404':
          description: Nenhuma assinatura ativa.
    post:
      tags:
        - Cliente & Painel
      summary: Cancelar ou reativar assinatura
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - acao
              properties:
                acao:
                  type: string
                  enum: [cancelar, reativar]
                  example: cancelar
      responses:
        '200':
          description: Assinatura atualizada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Assinatura'

  # --- CONTEÚDO & INVESTIGAÇÃO ---
  /conteudos-exclusivos:
    get:
      tags:
        - Conteúdo & Investigação
      summary: Listar conteúdos exclusivos / pistas liberadas
      responses:
        '200':
          description: Conteúdos disponíveis.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ConteudoExclusivo'

  /conteudos-exclusivos/{identificador}:
    get:
      tags:
        - Conteúdo & Investigação
      summary: Obter detalhes de um conteúdo exclusivo pelo identificador
      parameters:
        - name: identificador
          in: path
          required: true
          schema:
            type: string
            example: pista-ciclo-3
      responses:
        '200':
          description: Detalhes do conteúdo.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConteudoExclusivo'
        '403':
          description: Conteúdo bloqueado para o ciclo atual do assinante.

  /casos:
    get:
      tags:
        - Conteúdo & Investigação
      summary: Obter dados gerais dos casos e progresso
      responses:
        '200':
          description: Informações forenses consolidadas.
          content:
            application/json:
              schema:
                type: object
                properties:
                  casoAtivo:
                    $ref: '#/components/schemas/Caso'
                  progresso:
                    $ref: '#/components/schemas/ProgressoAssinante'
                  pistas:
                    type: array
                    items:
                      $ref: '#/components/schemas/Pista'

  # --- CONTEUDO DINAMICO E SEO ---
  /conteudo-dinamico:
    get:
      deprecated: true
      tags:
        - Conteúdo Dinâmico & SEO
      summary: Listar blocos de conteúdo dinâmico
      parameters:
        - name: rota
          in: query
          required: false
          schema:
            type: string
            example: /
          description: Filtrar blocos por rota de página
      responses:
        '200':
          description: Lista de blocos.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BlocoDinamico'

  /conteudo-dinamico/{chave}:
    get:
      deprecated: true
      tags:
        - Conteúdo Dinâmico & SEO
      summary: Obter bloco específico por chave
      parameters:
        - name: chave
          in: path
          required: true
          schema:
            type: string
            example: home.hero.title
          description: Chave única do bloco
      responses:
        '200':
          description: Bloco retornado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BlocoDinamico'
        '404':
          description: Bloco não encontrado.

  /seo:
    get:
      deprecated: true
      tags:
        - Conteúdo Dinâmico & SEO
      summary: Obter entradas de SEO
      parameters:
        - name: rota
          in: query
          required: true
          schema:
            type: string
            example: /loja
          description: Rota da página pública
      responses:
        '200':
          description: Metadados de SEO para a página.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntradaSeo'

  # --- CMS DELIVERY ---
  /paginas:
    get:
      tags:
        - CMS Delivery
      summary: Obter páginas publicadas
      description: Retorna uma única página publicada se o parâmetro rota for especificado, ou uma lista de páginas publicadas.
      parameters:
        - name: rota
          in: query
          required: false
          schema:
            type: string
            example: /sobre-o-clube
          description: Rota da página para obter a árvore completa de seções.
      responses:
        '200':
          description: Página ou lista de páginas retornadas com sucesso.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/PaginaCms'
                  - type: array
                    items:
                      $ref: '#/components/schemas/PaginaCms'
        '404':
          description: Página não encontrada.

  /menus/{chave}:
    get:
      tags:
        - CMS Delivery
      summary: Obter navegação pública por chave
      description: Retorna a estrutura de navegação do menu solicitado (ex. header-principal, footer-principal).
      parameters:
        - name: chave
          in: path
          required: true
          schema:
            type: string
            example: header-principal
          description: Chave única do menu.
      responses:
        '200':
          description: Estrutura do menu.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MenuCms'
        '404':
          description: Menu não encontrado.


components:
  schemas:
    Cliente:
      type: object
      properties:
        id:
          type: string
          example: cliente-001
        nome:
          type: string
          example: Mariana Silva
        email:
          type: string
          format: email
          example: mariana.silva@email.com
        telefone:
          type: string
          example: (11) 98765-4321
        preferencias:
          $ref: '#/components/schemas/PreferenciasAssinante'

    PreferenciasAssinante:
      type: object
      properties:
        tamanhoCamiseta:
          type: string
          example: M
        tamanhoCalcado:
          type: string
          example: 38
        observacoes:
          type: string
          example: Prefere tons escuros nas peças.

    Endereco:
      type: object
      properties:
        id:
          type: string
          example: endereco-001
        rotulo:
          type: string
          example: Casa
        logradouro:
          type: string
          example: Rua das Acácias
        numero:
          type: string
          example: 142
        complemento:
          type: string
          example: Apto 82
        bairro:
          type: string
          example: Vila Madalena
        cidade:
          type: string
          example: São Paulo
        estado:
          type: string
          example: SP
        cep:
          type: string
          example: 05435-020
        padrao:
          type: boolean
          example: true

    EntradaEndereco:
      type: object
      required:
        - rotulo
        - logradouro
        - numero
        - bairro
        - cidade
        - estado
        - cep
      properties:
        rotulo:
          type: string
          example: Trabalho
        logradouro:
          type: string
          example: Av. Paulista
        numero:
          type: string
          example: 1000
        complemento:
          type: string
        bairro:
          type: string
          example: Bela Vista
        cidade:
          type: string
          example: São Paulo
        estado:
          type: string
          example: SP
        cep:
          type: string
          example: 01310-100

    Produto:
      type: object
      properties:
        id:
          type: string
          example: produto-005
        identificador:
          type: string
          example: tcc-caixa-03-avulsa
        nome:
          type: string
          example: TCC - CAIXA 03 (AVULSA)
        tipo:
          type: string
          enum: [produto, caixa]
          example: caixa
        preco:
          type: integer
          example: 18990
        precoAssinante:
          type: integer
          example: 15990
        imagens:
          type: array
          items:
            type: string
          example: ["/imagens/caixa-03.jpg"]
        categorias:
          type: array
          items:
            type: string
          example: ["caixa", "avulsa"]
        emEstoque:
          type: boolean
          example: true
        disponibilidade:
          type: string
          enum: [disponivel, limitado, esgotado, em_breve]
          example: limitado

    ProdutoDetalhado:
      allOf:
        - $ref: '#/components/schemas/Produto'
        - type: object
          properties:
            descricao:
              type: string
              example: Detalhes completos da terceira caixa...
            descricaoCurta:
              type: string
              example: Caixa temática avulsa 03.
            itensInclusos:
              type: array
              items:
                type: string
              example: ["Fascículo", "Pista Física", "Acessório"]
            mesEdicao:
              type: string
              example: "2026-03"
            ciclo:
              type: integer
              example: 3
            relacionados:
              type: array
              items:
                type: string
              example: ["produto-002", "produto-006"]

    PlanoAssinatura:
      type: object
      properties:
        id:
          type: string
          example: plano-anual
        identificador:
          type: string
          example: anual
        nome:
          type: string
          example: Plano Anual
        descricao:
          type: string
          example: Melhor custo-benefício anual
        intervaloCobranca:
          type: string
          enum: [mensal, anual, avulso]
          example: anual
        preco:
          type: integer
          example: 143880
        precoPorMes:
          type: integer
          example: 11990
        recomendado:
          type: boolean
          example: true
        beneficios:
          type: array
          items:
            type: string
          example: ["Receba 12 caixas", "Acesso aos arquivos on-line"]
        mesesCompromisso:
          type: integer
          example: 12

    CarrinhoItem:
      type: object
      properties:
        id:
          type: string
          example: item-carrinho-001
        idProduto:
          type: string
          example: produto-005
        identificadorProduto:
          type: string
          example: tcc-caixa-03-avulsa
        nomeProduto:
          type: string
          example: TCC - CAIXA 03 (AVULSA)
        tipoProduto:
          type: string
          example: caixa
        quantidade:
          type: integer
          example: 1
        precoUnitario:
          type: integer
          example: 15990
        imagem:
          type: string
          example: /imagens/caixa-03.jpg

    Carrinho:
      type: object
      properties:
        id:
          type: string
          example: carrinho-001
        itens:
          type: array
          items:
            $ref: '#/components/schemas/CarrinhoItem'
        codigoCupom:
          type: string
          example: DETETIVE10
        descontoCupom:
          type: integer
          example: 1000
        freteEstimado:
          type: integer
          example: 1990
        regiaoFrete:
          type: string
          example: SP

    ResultadoCupom:
      type: object
      properties:
        valido:
          type: boolean
          example: true
        codigo:
          type: string
          example: DETETIVE10
        desconto:
          type: integer
          example: 1000
