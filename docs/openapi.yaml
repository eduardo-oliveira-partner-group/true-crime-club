        idCliente:
          type: string
          example: cliente-001
        idPlano:
          type: string
          example: plano-mensal
        nomePlano:
          type: string
          example: Plano Mensal
        status:
          type: string
          enum:
          - ativa
          - pagamento_pendente
          - cancelada
          - pausada
          - vencida
          example: ativa
        iniciadaEm:
          type: string
          format: date-time
        proximaCobrancaEm:
          type: string
          format: date-time
        valorProximaCobranca:
          type: integer
          example: 14990
        idCaixaCicloAtual:
          type: string
        nomeCaixaCicloAtual:
          type: string
        podeCancelar:
          type: boolean
          example: true
        podeReativar:
          type: boolean
          example: false
    MetodoPagamento:
      type: object
      properties:
        id:
          type: string
          example: metodo-pagamento-001
        tipo:
          type: string
          enum:
          - cartao_credito
          - pix
          example: cartao_credito
        rotulo:
          type: string
          example: Visa terminando em 4242
        ultimosQuatro:
          type: string
          example: '4242'
        bandeira:
          type: string
          example: Visa
        padrao:
          type: boolean
          example: true
    Pagamento:
      type: object
      required:
      - id
      - valor
      - status
      - metodo
      - vencimento
      properties:
        id:
          type: string
          example: pagamento-001
        idPedido:
          type: string
          description: Presente quando a cobrança está ligada a um pedido avulso.
          example: pedido-001
        idAssinatura:
          type: string
          description: Presente quando a cobrança está ligada à assinatura.
          example: assinatura-001
        valor:
          type: integer
          description: Valor em centavos.
          example: 14990
        status:
          type: string
          enum:
          - pendente
          - pago
          - recusado
          - expirado
          - estornado
          example: pago
        metodo:
          type: string
          enum:
          - cartao_credito
          - pix
          example: cartao_credito
        vencimento:
          type: string
          format: date-time
          example: '2026-03-01T00:00:00.000Z'
        pagoEm:
          type: string
          format: date-time
          example: '2026-03-01T08:12:00.000Z'
        pixQrCode:
          type: string
          description: Payload EMV do QR Code Pix, quando metodo=pix e status=pendente.
          example: 00020126580014BR.GOV.BCB.PIX0136mock-pix-qr-code
        pixExpiraEm:
          type: string
          format: date-time
          example: '2026-04-01T23:59:00.000Z'
        motivoRecusa:
          type: string
          description: Motivo legível quando status=recusado.
          example: Cartão recusado pelo emissor. Tente outro meio.
    Fatura:
      type: object
      required:
      - id
      - numero
      - idPagamento
      - valor
      - emitidoEm
