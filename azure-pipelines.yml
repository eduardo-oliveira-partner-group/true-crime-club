trigger:
  branches:
    include:
      - dev
      - master
      - hmg
      - prd
      - main

variables:
  containerRegistry: registry.kubernetes.partner1.com.br
  dockerRegistryServiceConnection: docker.partner
  imageRepositoryWeb: tcc-front-office-web
  imageTag: $(Build.BuildId)
  stackNameDev: tcc-web-dev
  stackNameHmg: tcc-web-hmg
  stackNamePrd: tcc-web-prd

stages:
  - stage: Build
    displayName: Build and Push
    jobs:
      - job: DockerBuildPush
        displayName: Build and push image
        pool:
          name: server28
        steps:
          - checkout: self
            fetchDepth: 1

          - task: Docker@2
            displayName: Build & Push frontend
            env:
              DOCKER_BUILDKIT: 1
            inputs:
              containerRegistry: $(dockerRegistryServiceConnection)
              repository: $(imageRepositoryWeb)
              command: buildAndPush
              Dockerfile: Dockerfile
              buildContext: .
              arguments: >-
                --build-arg BUILDKIT_INLINE_CACHE=1
                --cache-from $(containerRegistry)/$(imageRepositoryWeb):latest
              tags: |
                $(imageTag)
                latest

  - stage: Deploy
    displayName: Deploy Dev
    dependsOn: Build
    jobs:
      - job: SwarmDeploy
        displayName: Deploy stack on Swarm manager (Dev)
        pool:
          name: server28
        variables:
          - group: happyecommerce_dev
        steps:
          - checkout: self
            fetchDepth: 1

          - task: Docker@2
            displayName: Docker login (Dev)
            inputs:
              command: login
              containerRegistry: $(dockerRegistryServiceConnection)

          - script: |
              set -e
              export REGISTRY=$(containerRegistry)
              export STACK_NAME=$(stackNameDev)
              export WEB_TAG=$(imageTag)

              # Domínio público e URL interna para SSR
              export TCC_WEB_HOST='$(TCC_WEB_HOST)'
              export API_BASE_URL='http://tcc-api-dev_api:8000/api'

              echo "Deploying ${STACK_NAME} on Swarm..."
              docker stack deploy --with-registry-auth -c deploy/docker-stack.yml ${STACK_NAME}
            displayName: Deploy stack

  - stage: DeployHmg
    displayName: Deploy HMG
    dependsOn: Deploy
    jobs:
      - deployment: SwarmDeployHmg
        displayName: Deploy stack on Swarm manager (HMG)
        pool:
          name: server28
        variables:
          - group: happyecommerce_hmg
        environment: happyecommerce_hmg
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self
                  fetchDepth: 1

                - task: Docker@2
                  displayName: Docker login (HMG)
                  inputs:
                    command: login
                    containerRegistry: $(dockerRegistryServiceConnection)

                - script: |
                    set -e
                    export REGISTRY=$(containerRegistry)
                    export STACK_NAME=$(stackNameHmg)
                    export WEB_TAG=$(imageTag)

                    export TCC_WEB_HOST='$(TCC_WEB_HOST)'
                    export API_BASE_URL='http://tcc-api-hmg_api:8000/api'

                    echo "Deploying ${STACK_NAME} on Swarm..."
                    docker stack deploy --with-registry-auth -c deploy/docker-stack.yml ${STACK_NAME}
                  displayName: Deploy stack

  - stage: DeployPrd
    displayName: Deploy PRD
    dependsOn: DeployHmg
    jobs:
      - deployment: SwarmDeployPrd
        displayName: Deploy stack on Swarm manager (PRD)
        pool:
          name: server28
        variables:
          - group: happyecommerce_prd
        environment: happyecommerce_prd
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self
                  fetchDepth: 1

                - task: Docker@2
                  displayName: Docker login (PRD)
                  inputs:
                    command: login
                    containerRegistry: $(dockerRegistryServiceConnection)

                - script: |
                    set -e
                    export REGISTRY=$(containerRegistry)
                    export STACK_NAME=$(stackNamePrd)
                    export WEB_TAG=$(imageTag)

                    export TCC_WEB_HOST='$(TCC_WEB_HOST)'
                    export API_BASE_URL='http://tcc-api-prd_api:8000/api'

                    echo "Deploying ${STACK_NAME} on Swarm..."
                    docker stack deploy --with-registry-auth -c deploy/docker-stack.yml ${STACK_NAME}
                  displayName: Deploy stack
